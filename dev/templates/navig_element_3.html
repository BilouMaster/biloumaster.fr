<a class="navig_element" href="{href}">
    <div class="preview_images">
        <div style="background-image: url('{img1}'); grid-column: 1;"></div>
        <div style="background-image: url('{img2}'); grid-column: 2;"></div>
        <div style="background-image: url('{img3}'); grid-column: 3;"></div>
    </div>
    <img class="navig_icon" src="/img/{icon}.svg" alt="logo {icon}">
    <h2>{title}</h2>
    <p>{description}</p>
</a>
