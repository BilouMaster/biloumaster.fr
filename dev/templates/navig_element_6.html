<a class="navig_element" href="{href}">
    <div class="preview_images">
        <div style="background-image: url('{img1}'); grid-column: 1; grid-row: 1 / 7;"></div>
        <div style="background-image: url('{img2}'); grid-column: 2; grid-row: 1 / 4;"></div>
        <div style="background-image: url('{img3}'); grid-column: 2; grid-row: 4 / 7;"></div>
        <div style="background-image: url('{img4}'); grid-column: 3; grid-row: 1 / 3;"></div>
        <div style="background-image: url('{img5}'); grid-column: 3; grid-row: 3 / 5;"></div>
        <div style="background-image: url('{img6}'); grid-column: 3; grid-row: 5 / 7;"></div>
    </div>
    <img class="navig_icon" src="/img/{icon}.svg" alt="logo {icon}">
    <h2>{title}</h2>
    <p>{description}</p>
</a>
